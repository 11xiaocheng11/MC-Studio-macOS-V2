directories:
  output: release
  buildResources: build
appId: com.mcstudio.macos
productName: MC Studio macOS
files:
  - filter:
      - dist/**/*
      - electron/**/*
      - node_modules/**/*
      - package.json
mac:
  icon: build/icon.icns
  target:
    - target: dmg
      arch:
        - universal
  category: public.app-category.developer-tools
  darkModeSupport: true
  hardenedRuntime: false
  gatekeeperAssess: false
dmg:
  title: MC Studio macOS
  icon: build/icon.icns
  contents:
    - x: 130
      'y': 220
    - x: 410
      'y': 220
      type: link
      path: /Applications
electronVersion: 28.3.3
